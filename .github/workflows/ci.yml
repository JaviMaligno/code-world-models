name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  paper:
    name: LaTeX presentation guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-science texlive-bibtex-extra biber
      - name: Compile paper and check overfull / undefined refs
        run: bash scripts/check_latex.sh

  tests:
    name: Python tests (Azure-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run test suite
        run: pytest -q
